<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donasi - Wikybook</title>
  <meta name="description" content="Dukung keberlanjutan Wikybook melalui donasi.">
  
  <!-- Favicon & Open Graph (OG) -->
  <link rel="icon" href="logo.png" type="image/png">
  <meta property="og:title" content="Donasi - Wikybook">
  <meta property="og:description" content="Dukung keberlanjutan Wikybook melalui donasi.">
  <meta property="og:image" content="logo.png">
  <meta property="og:url" content="https://donate.hypeemart.my.id">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Donasi - Wikybook">
  <meta name="twitter:image" content="logo.png">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gray: { 
              50: '#f9fafb', 100: '#f3f4f6', 200: '#e5e7eb', 300: '#d1d5db', 
              400: '#9ca3af', 500: '#6b7280', 600: '#4b5563', 700: '#374151', 
              800: '#1f2937', 900: '#111827' 
            },
            blue: { 50: '#eff6ff', 500: '#3b82f6', 600: '#2563eb' }
          },
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    body { -webkit-tap-highlight-color: transparent; }
    .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .fade-out { animation: fadeOut 0.3s ease-in forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-12px); } }
    
    /* Custom Scrollbar for clean look */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #d1d5db; }

    /* Hide Scrollbar for Horizontal List */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes fadeInUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .fade-in-up { animation: fadeInUp 0.5s ease-out forwards; }
    @keyframes pop { 0%{transform:scale(0.8);opacity:0} 70%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }
    .pop-in { animation: pop 0.4s ease-out forwards; }

    /* Custom Input Auto-fill style override */
    input:-webkit-autofill,
    input:-webkit-autofill:hover, 
    input:-webkit-autofill:focus, 
    input:-webkit-autofill:active{
        -webkit-box-shadow: 0 0 0 30px white inset !important;
    }
  </style>
</head>

<body class="bg-[#FAFAFA] text-gray-900 font-sans antialiased min-h-screen flex flex-col selection:bg-gray-200 selection:text-black">

  <!-- Main Application Container -->
  <div id="app-container" class="flex-grow w-full max-w-2xl mx-auto px-4 sm:px-6 relative flex flex-col min-h-screen">
    <!-- Konten akan dirender oleh JavaScript di sini -->
  </div>

  <!-- =============================================
       MODAL BAGIKAN (SHARE POPUP)
       ============================================= -->
  <div id="share-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity" onclick="closeShareModal()"></div>
    
    <!-- Modal Content -->
    <div class="bg-white rounded-[1.5rem] w-full max-w-md overflow-hidden shadow-2xl relative z-10 border border-gray-100 transform scale-95 opacity-0 transition-all duration-300 ease-out" id="share-modal-card">
      <!-- Header -->
      <div class="px-6 pt-6 pb-4 flex items-center justify-between border-b border-gray-50">
        <h3 class="text-lg font-bold text-gray-900">Bagikan Wikybook</h3>
        <button onclick="closeShareModal()" class="p-1.5 rounded-full hover:bg-gray-100 text-gray-400 hover:text-gray-700 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <!-- Body -->
      <div class="p-6 space-y-6">
        <p class="text-sm text-gray-500 leading-relaxed">
          Bantu kami menyebarkan semangat literasi global ini kepada keluarga, teman, atau komunitas Anda. Satu bagikan Anda sangat berarti!
        </p>

        <!-- Link Copy Area -->
        <div class="space-y-2">
          <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider">Tautan Donasi</label>
          <div class="flex items-center gap-2 bg-gray-50 border border-gray-200 rounded-xl p-2 pl-3">
            <span id="share-url-text" class="text-sm text-gray-600 font-mono truncate flex-grow">https://wikybook.org/donate</span>
            <button onclick="copyShareLink()" id="btn-copy-modal" class="p-2.5 bg-transparent border border-gray-900 text-gray-900 rounded-lg hover:bg-gray-50 transition-all shadow-sm flex items-center justify-center shrink-0" title="Salin Tautan">
              <span id="copy-btn-icon">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
              </span>
            </button>
          </div>
        </div>

        <!-- Social Media Grid -->
        <div class="space-y-3">
          <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider">Bagikan Lewat Aplikasi</label>
          <div class="flex overflow-x-auto gap-3 pb-2 pt-1 snap-x hide-scrollbar" id="social-share-buttons">
            <!-- Buttons will be rendered with correct URLs -->
          </div>
        </div>
      </div>
    </div>
  </div>

// =============================================
// RENDER FUNCTIONS
// =============================================

function renderHeader(isMain = true) {
  if (isMain) {
    return `
      <header class="sticky top-0 z-50 bg-[#FAFAFA]/95 backdrop-blur-md border-b border-gray-100 py-3 -mx-4 px-4 sm:-mx-6 sm:px-6">
        <div class="flex items-center justify-between">
          <div class="flex items-center justify-start text-gray-900 cursor-pointer" onclick="renderView('landing')">
            <div class="flex items-center justify-center flex-shrink-0">
              ${icons.logo}
            </div>
            <span class="text-[1.65rem] font-bold tracking-tight text-gray-900 leading-none -ml-1 mt-3">ikybook</span>
          </div>
          <button onclick="openShareModal()" class="p-2 text-gray-500 hover:text-gray-900 rounded-lg hover:bg-gray-100 transition-colors focus:outline-none" title="Bagikan">
            ${icons.share}
          </button>
        </div>
      </header>
    `;
  } else {
    return `
      <header class="sticky top-0 z-50 bg-[#FAFAFA]/95 backdrop-blur-md border-b border-gray-100 py-4 -mx-4 px-4 sm:-mx-6 sm:px-6">
        <div class="flex items-center justify-between">
          <button onclick="renderView('payment-methods')" class="p-2 -ml-2 text-gray-500 hover:text-gray-900 rounded-lg hover:bg-gray-100 transition-colors focus:outline-none flex items-center gap-1">
            ${icons.arrowLeft}
          </button>
          <span class="text-base font-bold text-gray-900">Pembayaran</span>
          <div class="w-10"></div> <!-- Spacer for perfect centering -->
        </div>
      </header>
    `;
  }
}

function renderFooter() {
  return `
    <footer class="py-8 mt-auto border-t border-gray-100 flex flex-col items-center">
      <div class="flex items-center justify-center gap-6 mb-4">
          <a href="#" class="text-gray-400 hover:text-[#1877F2] transition-colors" title="Facebook">${icons.social.facebook}</a>
          <a href="#" class="text-gray-400 hover:text-[#000000] transition-colors" title="X (Twitter)">${icons.social.x}</a>
          <a href="#" class="text-gray-400 hover:text-[#E4405F] transition-colors" title="Instagram">${icons.social.instagram}</a>
      </div>
      <p class="text-xs text-gray-400 text-center leading-relaxed">
        &copy; 2026 Wikybook. Seluruh hak cipta dilindungi.<br/>
        Terima kasih atas kontribusi Anda membangun literasi dunia.
      </p>
    </footer>
  `;
}

// 1. Landing View
function viewLanding() {
  return `
    ${renderHeader(true)}

      </div>
      
      <h1 class="text-3xl sm:text-4xl font-extrabold text-gray-900 mb-5 tracking-tight leading-tight">
        Dukung <span class="text-transparent bg-clip-text bg-gradient-to-r from-gray-900 to-gray-500">Wikybook</span>
      </h1>
      
      <p class="text-gray-500 text-base leading-relaxed mb-10 max-w-lg">
        Wikybook berkomitmen untuk selalu menjadi ensiklopedia global dan wadah <i>sharing</i> artikel-artikel baru secara <b>gratis</b> tanpa gangguan iklan. Dukungan Anda sangat berarti untuk menjaga kelancaran server dan pengembangan platform ke depannya.
      </p>

// Handle redirect kembali dari Xendit (status=success/failed)
window.addEventListener('DOMContentLoaded', function() {
  var params = new URLSearchParams(window.location.search);
  var status = params.get('status');
  if (status === 'success') {
    window.history.replaceState({}, '', window.location.pathname);
    var saved = localStorage.getItem('wikybook_tx');
    if (saved) {
      try {
        currentTransaction = JSON.parse(saved);
        localStorage.removeItem('wikybook_tx');
      } catch(e) {}
    }
    showStrukFromXendit(currentTransaction);
  } else if (status === 'failed') {
    window.history.replaceState({}, '', window.location.pathname);
    renderView('landing');
    setTimeout(function() { showToast('Pembayaran dibatalkan atau gagal. Silakan coba lagi.'); }, 300);
  }
});
(function checkXenditRedirect() {
  const params = new URLSearchParams(window.location.search);
  const status = params.get('status');
  if (status === 'success') {
    window.history.replaceState({}, '', window.location.pathname);
    // Ambil data transaksi dari localStorage
    const saved = localStorage.getItem('wikybook_tx');
    if (saved) {
      try {
        currentTransaction = JSON.parse(saved);
        localStorage.removeItem('wikybook_tx');
      } catch(e) {}
    }
    // Render struk setelah DOM siap
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function() {
        showStrukFromXendit(currentTransaction);
      });
    } else {
      // DOM sudah ready, langsung render
      setTimeout(function() { showStrukFromXendit(currentTransaction); }, 50);
    }
  } else if (status === 'failed') {
    window.history.replaceState({}, '', window.location.pathname);
    window.addEventListener('DOMContentLoaded', function() {
      showToast('Pembayaran dibatalkan atau gagal. Silakan coba lagi.');
    });
  }
})();

function renderView(viewName) {

    app.innerHTML = viewConfirmation();
  }
}

function selectPayment(id) {
  selectedPaymentMethod = id;
  renderView('confirmation');
}

function copyToClipboard(text) {
  const cleanText = text.replace(/\s+/g, '');
  
  let textArea = document.createElement("textarea");
  textArea.value = cleanText;
  
  textArea.style.position = "fixed";
  textArea.style.top = "-9999px";
  textArea.style.left = "-9999px";
  textArea.style.opacity = "0";
  
  document.body.appendChild(textArea);
  textArea.focus();
  textArea.select();
  
  try {
      document.execCommand('copy');
      showToast('Disalin ke papan klip!');
  } catch (err) {
      console.error('Gagal menyalin', err);
      showToast('Gagal menyalin teks');
  }
  
  document.body.removeChild(textArea);
}

// 2. Integrasi Real Checkout API Xendit (Sandbox)
const BACKEND_URL = 'https://superagent-bdb69596.base44.app/functions/xenditPayment';

async function handleXenditCheckout(e) {
  e.preventDefault();

  const name = document.getElementById('xenditName').value || 'Hamba Allah';
  const email = document.getElementById('xenditEmail').value;
  const amount = document.getElementById('xenditAmount').value;
  const method = paymentMethods.find(m => m.id === selectedPaymentMethod);
  if (!method) { alert('Pilih metode pembayaran terlebih dahulu!'); return; }
  const txId = 'INV-' + Date.now() + '-' + Math.floor(Math.random() * 9000 + 1000);

  currentTransaction = { name, email, amount, method: method.name, number: method.number, txId };

  const btn = e.target.querySelector('button[type="submit"]');
  btn.innerHTML = `<svg class="animate-spin h-5 w-5 text-gray-900" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> <span class="text-gray-900 ml-2">Memproses...</span>`;
  btn.disabled = true;

  try {
    const res = await fetch(BACKEND_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, amount, paymentMethod: method.id, externalId: txId })
    });
    const data = await res.json();

    if (!res.ok || !data.success) {
      btn.innerHTML = 'Proses Donasi';
      btn.disabled = false;
      alert('Gagal membuat invoice: ' + (data.error || 'Coba lagi'));
      return;
    }

    // Simpan data transaksi ke localStorage sebelum redirect ke Xendit
    currentTransaction.invoiceId = data.invoiceId;
    currentTransaction.invoiceUrl = data.invoiceUrl;
    localStorage.setItem('wikybook_tx', JSON.stringify(currentTransaction));
    window.location.href = data.invoiceUrl;

  } catch (err) {
    btn.innerHTML = 'Proses Donasi';
    btn.disabled = false;
    alert('Koneksi gagal. Pastikan internet aktif dan coba lagi.');
  }
}

           <!-- Tombol Unduh / Kembali (Garis Outline) -->
           <div class="space-y-3">
             <button onclick="showToast('Mengunduh struk...')" class="w-full py-3.5 bg-transparent border border-gray-900 text-gray-900 font-bold rounded-xl hover:bg-gray-50 transition-all flex justify-center items-center gap-2">
               ${icons.download} Unduh Struk
             </button>
             <button onclick="renderView('landing')" class="w-full py-3 bg-transparent text-gray-500 font-semibold rounded-xl hover:text-gray-900 transition-all text-sm">
               Kembali ke Beranda
             </button>
           </div>
        </div>
      </div>
    </main>
  `;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showToast(message) {
  const existing = document.getElementById('toast-msg');
  if (existing) existing.remove();
  
  const toast = document.createElement('div');
  toast.id = 'toast-msg';
  toast.className = 'fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-5 py-2.5 rounded-full text-sm font-medium shadow-2xl z-[200] fade-in flex items-center gap-2 border border-gray-800';
  toast.innerHTML = `<span>${message}</span>`;
  document.body.appendChild(toast);
  
  setTimeout(() => {
    toast.classList.remove('fade-in');
    toast.classList.add('fade-out');
    setTimeout(() => toast.remove(), 300);
  }, 2500);
}

function closeShareModal() {
  const shareModal = document.getElementById('share-modal');
  const shareCard = document.getElementById('share-modal-card');

  shareCard.classList.add('scale-95', 'opacity-0');

}

function copyShareLink() {
  const currentUrl = window.location.href;
  const btn = document.getElementById('btn-copy-modal');
  const btnIcon = document.getElementById('copy-btn-icon');
  
  let textArea = document.createElement("textarea");
  textArea.value = currentUrl;
  
  textArea.style.position = "fixed";
  textArea.style.top = "-9999px";
  textArea.style.left = "-9999px";
  textArea.style.opacity = "0";
  
  document.body.appendChild(textArea);
  textArea.focus();
  textArea.select();
  
  try {
    document.execCommand('copy');
    onShareCopiedSuccess(btn, btnIcon);
  } catch (err) {
    console.error('Gagal menyalin', err);
    showToast('Gagal menyalin tautan');
  }
  
  document.body.removeChild(textArea);
}

function onShareCopiedSuccess(btn, btnIcon) {
  btnIcon.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>`;
  btn.classList.add('bg-gray-100');
  
  setTimeout(() => {
    btnIcon.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>`;
    btn.classList.remove('bg-gray-100');
  }, 2000);
}
